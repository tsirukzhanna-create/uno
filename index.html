<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO Counter</title>
<style>
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent !important; }
body {
margin: 0; padding: 0; font-family: Arial, sans-serif;
background-size: cover; background-position: center;
background-repeat: no-repeat; background-attachment: fixed;
display: flex; justify-content: center; min-height: 100vh;
/* Базовые картинки для обычной UNO */
--bg-main: url('background.png');
--bg-bottom-sheet: url('vibor_card.png');
--bg-sheet-color: red;
--bg-calc-player-badge: #24a122;
--bg-calc-player-badge-2: #E50000;
--bg-calc-vibor-player: url('vibor_player.png');
--bg-player-row-active-bg: url('player_row_active_bg.png');
--bg-player-row-bg: url('player_row_bg.png');
--bg-image-add-player: url('image_add_player.png');
--bg-button-ok: url('button_ok.png');
--bg-btn-confirm: url('button_ok.png');
--bg-rating-header: url('top.png');
--bg-settings-header: url('player.png');
background-image: var(--bg-main);
transition: background-image 0.3s ease;
}
/* Переменные для режима UNO Flip */
body[data-theme="UNO Flip"] {
--bg-main: url('background_flip.png');
--bg-bottom-sheet: url('vibor_card_f.png');
--bg-sheet-color: #6A0851;
--bg-calc-player-badge: #6A0851;
--bg-calc-player-badge-2: #6A0851;
--bg-btn-ok: url('button_ok_f.png');
--bg-calc-vibor-player: url('vibor_player_f.png');
--bg-player-row-active-bg: url('player_row_active_bg_f.png');
--bg-player-row-bg: url('player_row_bg_f.png');
--bg-image-add-player: url('image_add_player_f.png');
--bg-button-ok: url('button_ok_f.png');
--bg-btn-confirm: url('button_ok_f.png');
--bg-rating-header: url('top_f.png');
--bg-settings-header: url('player_f.png');
}
/* Переменные для режима UNO Dos */
body[data-theme="UNO Dos"] {
--bg-main: url('background_dos.png');
--bg-bottom-sheet: url('vibor_card_d.png');
--bg-sheet-color: #1B0094;
--bg-calc-player-badge: #000000;
--bg-calc-player-badge-2: #1B0094;
--bg-calc-vibor-player: url('vibor_player_d.png');
--bg-player-row-active-bg: url('player_row_active_bg_d.png');
--bg-player-row-bg: url('player_row_bg_d.png');
--bg-image-add-player: url('image_add_player_d.png');
--bg-button-ok: url('button_ok_d.png');
--bg-btn-confirm: url('button_ok_d.png');
--bg-rating-header: url('top_d.png');
--bg-settings-header: url('player_d.png');
}
.app-container {
width: 100%; max-width: 420px; height: 100vh;
display: flex; flex-direction: column; justify-content: flex-start;
position: relative; overflow: hidden; background: rgba(0,0,0,0.1);
}

/* ГЛАВНАЯ ПЛАШКА ВЫБОРА ИГРЫ */
.game-version-deck {
width: calc(100% - 30px);
max-width: 380px;
height: 1030px;
margin: -930px auto 15px auto;
position: relative;
z-index: 300;
transition: opacity 0.2s ease;
}
.version-card {
position: absolute;
width: 100%;
left: 0;
top: 0;
cursor: pointer;
transition: transform 0.3s ease-out, opacity 0.3s ease-out;
opacity: 0;
z-index: 10;
}
.version-card img { width: 100%; display: block; }
.version-card.active-deck { z-index: 40; opacity: 1; transform: translateY(0); }
.game-version-deck.expanded { z-index: 400; }
.game-version-deck.expanded .version-card { opacity: 1; }
.game-version-deck.expanded .version-card[data-version="UNO"] { transform: translateY(250px); z-index: 10; }
.game-version-deck.expanded .version-card[data-version="UNO Dos"] { transform: translateY(130px); z-index: 20; }
.game-version-deck.expanded .version-card[data-version="UNO Flip"] { transform: translateY(10px); z-index: 40; }

/* ОБЕРТКА ДЛЯ СЛАЙДЕРА СТРАНИЦ */
.pages-wrapper {
display: flex;
width: 300%;
height: 100%;
transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
will-change: transform;
flex: 1;
}

/* КОНТЕЙНЕРЫ СТРАНИЦ */
.page {
display: flex;
flex-direction: column;
align-items: center;
padding: 0 15px 90px 15px;
width: 33.3333%;
height: 100%;
overflow-y: auto;
scrollbar-width: none;
box-sizing: border-box;
}
.page::-webkit-scrollbar { display: none; }

.players-grid {
display: grid; grid-template-columns: repeat(3, 104px); justify-content: center; gap: 18px;
width: 100%; max-width: 380px; margin: 20px auto 0 auto; padding: 0 10px; position: relative; z-index: 50;
}
.player-card {
width: 104px; height: 191px; box-sizing: border-box; margin: 0 auto; position: relative;
display: flex; flex-direction: column; justify-content: space-between; align-items: center;
cursor: pointer; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.25));
}
.player-card-frame {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background-image: url('image_player_card.png'); background-size: 100% 100%; background-repeat: no-repeat;
z-index: 2; pointer-events: none;
}
.player-photo {
position: absolute; top: 40px; left: 13px; width: 75%; height: 70%; z-index: 1; object-fit: cover; background-color: #2c2c2c;
}
.player-name-badge {
position: absolute; top: 7px; left: 0; right: 0; color: var(--bg-calc-player-badge-2); font-size: 15px; font-weight: bold; text-align: center; padding: 0 5px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 3;
}
.player-score {
position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; color: var(--bg-calc-player-badge-2); font-size: 20px; font-weight: bold; z-index: 3;
}
.bottom-nav {
position: fixed; bottom: -85px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; height: 165px;
display: flex; justify-content: space-between; align-items: center; z-index: 150;
}
.nav-btn { width:50%; height: 100%; cursor: pointer; }
.nav-btn img { width: 100%; height: 100%; object-fit: contain; }
.modal-overlay-bg {
position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 999; display: none;
}
.modal-overlay-bg.open { display: block; }
.bottom-sheet, .player-selector-menu {
position: absolute; bottom: 0; left: 0; right: 0; background-size: 100% auto; background-position: top center; background-repeat: no-repeat; background-color: transparent;
height: 550px; transform: translateY(100%); transition: transform 0.3s ease-out; z-index: 1000; display: flex; flex-direction: column;
}
.bottom-sheet.open, .player-selector-menu.open { transform: translateY(0); }
.sheet-cards-bg { background-image: var(--bg-bottom-sheet); padding: 75px 25px 0px 25px; }
.player-selector-menu-bg { background-image: var(--bg-calc-vibor-player); padding: 0; }
.calc-player-badge {
position: absolute; background: transparent; border: none; font-size: 35px; font-weight: bold; color: var(--bg-calc-player-badge); text-align: center;
top: 15px; left: 70px; width: 160px; z-index: 1010; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.calc-score-badge {
 position: absolute; background: transparent; border: none; font-size: 35px; font-weight: bold; color: var(--bg-calc-player-badge); text-align: center; 
 top: 15px; left: 75%; transform: translateX(-50%); width: 120px; z-index: 1010;
}
.btn-confirm-round {
position: absolute; cursor: pointer; filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.3)); z-index: 1020; bottom: 15px; right: 90px; width: 60px; height: 60px;
}
.btn-flip-side {
position: absolute; top: 474px; left: 47px; width: 67px; height: 67px; cursor: pointer; z-index: 1020; display: none;
}
.cards-scroll-area {
overflow-y: auto; overflow-x: hidden; flex-grow: 1; margin-bottom: 0px; padding: 0px 5px; scrollbar-width: none; width: 100%;
}
.cards-scroll-area::-webkit-scrollbar { display: none; }
.uno-cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 0 auto; padding: 10px 0 80px 0; justify-content: center; }
.uno-card-item { position: relative; aspect-ratio: 2/3; background: transparent; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; }
.uno-card-counter {
position: absolute; top: -5px; right: -3px; background-image: url('kolvo_card.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; color: #09BC00; font-size: 22px; font-weight: bold;
width: 26px; height: 26px; display: none; justify-content: center; align-items: center; z-index: 5;
}
.uno-card-counter.active { display: flex; }
.sticky-header-image {
  position: sticky; top: -1px; z-index: 100; flex-shrink: 0; align-self: center; width: 100%; max-width: 380px; height: 125px; margin: 0px auto 5px auto;
  background-size: contain; background-repeat: no-repeat; background-position: top center; 
}
.rating-title-image { background-image: var(--bg-rating-header); }
.settings-title-image { background-image: var(--bg-settings-header); }
.rating-scroll-container { width: 100%; display: flex; flex-direction: column; gap: 0px; padding: 0px 0px 20px 0px; margin-top: 0px; }
 .rating-player-row { height: 160px; width: 100%; position: relative; font-weight: bold; overflow: hidden; }
 .rating-row-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 2; pointer-events: none; }
 .rating-row-photo { position: absolute; top: 25px; left: 32px; width: 100px; height: 100px; z-index: 1; object-fit: cover; border-radius: 15px; background-color: #2c2c2c; }
 .rating-player-name { position: absolute; top: 29px; left: 175px; font-size: 23px; text-transform: uppercase; color: var(--bg-calc-player-badge-2); z-index: 3; }
 .rating-player-rank { position: absolute; bottom: 39px; left: 186px; font-size: 25px; color: white; z-index: 3; }

 .rank-1 { background-image: url('frame_player_gold.png'); }
 .rank-2 { background-image: url('frame_player_silver.png'); }

 .uno-card-item img { width: 100%; height: 100%; object-fit: contain; }
.add-player-card {
background-image: var(--bg-image-add-player); background-size: contain; background-repeat: no-repeat; background-position: center;
aspect-ratio: 104/191; width: 104px; cursor: pointer; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.25)); margin: 0 auto;
}
.player-selector-content { width: 100%; height: 100%; padding: 27px 0px; box-sizing: border-box; display: flex; flex-direction: column; }
.player-selector-header { color: #fff; font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 0px; text-shadow: 1px 1px 3px black; }
.player-selector-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 12px; padding: 20px 0px 40px; margin-bottom: -50px; scrollbar-width: none; }
.player-selector-list::-webkit-scrollbar { display: none; }
.player-selector-row {
 width: 308px; min-width: 308px; max-width: 308px; height: 115px; min-height: 115px; max-height: 115px; display: flex; justify-content: center; align-items: center;
 padding: 0 5px; box-sizing: border-box; cursor: pointer; transition: filter 0.2s ease, transform 0.1s ease; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.25)); position: relative; margin: 0; z-index: 1;
}
.player-selector-row .player-photo-mini {
 position: absolute; top: 15px; left: 28px; width: 68px; height: 85px; background-color: #2c2c2c; background-size: cover; background-position: center; background-repeat: no-repeat; border-radius: 4px; z-index: 1;
}
.player-selector-row::after {
 content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-player-row-bg); background-size: 100% 100%; background-repeat: no-repeat; z-index: 2; pointer-events: none;
}
.player-selector-row.active::after { background-image: var(--bg-player-row-active-bg); }
.player-row-name { color: var(--bg-calc-player-badge); font-size: 18px; font-weight: bold; position: absolute; top: 19px; left: 210px; transform: translateX(-50%); z-index: 3; }
.player-selector-ok-btn { position: absolute; bottom: 20px; left: 315px; top: 475px; width: 65px; height: 65px; background-image: var(--bg-button-ok); background-size: contain; background-repeat: no-repeat; cursor: pointer; z-index: 10; }
.btn-confirm-round {
 position: absolute; cursor: pointer; filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.3)); z-index: 1020; bottom: 15px; right: 50px; width: 60px; height: 60px; 
 background-image: var(--bg-btn-confirm); background-size: contain; background-repeat: no-repeat; background-position: center;
}
.settings-player-item {
  display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.12);
  padding: 12px 15px; margin: 0 auto 10px auto; border-radius: 12px; color: white; border: 1px solid rgba(255,255,255,0.05);
}
.settings-photo-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background-color: #444; border: 2px solid #fff; cursor: pointer; }
.settings-player-name-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 10px; border-radius: 6px; font-size: 16px; font-weight: bold; width: 130px; text-transform: uppercase; }
.settings-player-name-input:focus { outline: none; border-color: var(--bg-calc-player-badge); }
.btn-upload-photo { background: var(--bg-calc-player-badge); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
.btn-delete-player { background: #E50000; color: white; border: none; padding: 8px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
.btn-add-new-player-trigger {
  display: block; width: 100%; max-width: 380px; margin: 20px auto; background: #24a122; color: white; border: none; padding: 14px;
  font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.btn-reset-leaderboard {
  display: block; width: 100%; max-width: 380px; margin: 10px auto 10px auto; background: #E50000; color: white; border: none; padding: 12px;
  font-size: 15px; font-weight: bold; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.25); text-transform: uppercase; transition: background-color 0.2s;
}
.btn-reset-leaderboard:active { background: #b30000; }
.winner-fullscreen-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 5000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
}
.winner-banner-img { position: absolute; z-index: 2; top: 120px; width: 90%; max-width: 380px; height: auto; object-fit: contain; margin-bottom: 0px; }
.winner-photo {
  position: absolute; z-index: 1; top: 130px; width: 370px; height: 465px; object-fit: cover; border-radius: 35px; margin-bottom: 10px; box-shadow: 0px 6px 15px rgba(0,0,0,0.6); background-color: #2c2c2c;
}
.winner-name-text { position: absolute; top: 150px; z-index: 2; color: #fff; font-size: 26px; font-weight: bold; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>

import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUoCkHbnFMOyUzBvHb11HvP-6UT7sDPd4",
  authDomain: "uno-95193.firebaseapp.com",
  projectId: "uno-95193",

  measurementId: "G-N3R1NGXT75"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const gameStateRef = doc(db, "uno_app", "game_state");

var curPlayerId = null;
var currentRoundCounts = {};
var selectedVersion = "UNO";
var isDeckExpanded = false;
var isDarkSideActive = false;
var photoTargetPlayerId = null;

// ПЕРЕМЕННЫЕ ДЛЯ СЛАЙДЕРА
const pagesList = ['page-game', 'page-rating', 'page-settings'];
let currentPageIndex = 0;
let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

var defaultPlayers = [
{ id: 1, name: "ЯНА", score: 0, globalScore: 0, photo: "photo_5305306486818938491_y.jpg" },
{ id: 2, name: "ИЛЬЯ", score: 0, globalScore: 0, photo: "photo_5305306486818938486_x.jpg" },
{ id: 3, name: "ЖАННА", score: 0, globalScore: 0, photo: "photo_5305306486818938490_w.jpg" },
{ id: 4, name: "CЕРЕЖА", score: 0, globalScore: 0, photo: "photo_5305306486818938494_x.jpg" },
{ id: 5, name: "АНТОН", score: 0, globalScore: 0, photo: "photo_5305306486818938492_x.jpg" },
{ id: 6, name: "МАША", score: 0, globalScore: 0, photo: "photo_5305306486818938478_m.jpg" },

{ id: 9, name: "ДАНИЛ", score: 0, globalScore: 0, photo: "photo_5308003928144287430_x.jpg" }
];

var players = [];
var activePlayerIds = [];
var tempSelectedPlayerIds = [];

function savePlayersToDB() {
  setDoc(gameStateRef, { players: players }, { merge: true })
    .catch(error => console.error("Ошибка сохранения в Firebase:", error));
}

onSnapshot(gameStateRef, (docSnap) => {
  if (docSnap.exists()) {
    players = docSnap.data().players || [];
  } else {
    players = defaultPlayers;
    savePlayersToDB();
  }
  
  renderMainGrid();
  if (document.getElementById('page-rating').classList.contains('active')) updateLeaderboard();
  if (document.getElementById('page-settings').classList.contains('active')) renderSettingsPlayers();
});

var themeAssets = {

};
var cardsData = {

{ id: "c1", points: 1, img: "uno_1.jpg" }, { id: "c2", points: 2, img: "uno_2.jpg" },
{ id: "c3", points: 3, img: "uno_3.jpg" }, { id: "c4", points: 4, img: "uno_4.jpg" },
{ id: "c5", points: 5, img: "uno_5.jpg" }, { id: "c6", points: 6, img: "uno_6.jpg" },

function getActiveDeckKey() {
if (selectedVersion === "UNO Flip" && isDarkSideActive) { return "UNO Flip dark"; }
return selectedVersion;
}

function renderMainGrid() {
var grid = document.getElementById('main-players-grid');
grid.innerHTML = '';
players.forEach(function(player) {
if (activePlayerIds.includes(player.id)) {
var playerCard = document.createElement('div');
playerCard.className = 'player-card';
var imgSrc = player.photo ? player.photo : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
playerCard.innerHTML = `
<img class="player-photo" src="${imgSrc}" alt="">
<div class="player-card-frame"></div>
<div class="player-name-badge">${player.name}</div>
<div class="player-score">${player.score}</div>
`;
playerCard.addEventListener('click', function() { openCardCalc(player.id); });
grid.appendChild(playerCard);
}
});
var addCard = document.createElement('div');
addCard.className = 'add-player-card';
addCard.addEventListener('click', function(e) {
e.stopPropagation();
openPlayerSelectorMenu();
});
grid.appendChild(addCard);
}

function openPlayerSelectorMenu() {
tempSelectedPlayerIds = [...activePlayerIds];
var listContainer = document.getElementById('player-selector-list');
listContainer.innerHTML = '';
players.forEach(function(player) {
var row = document.createElement('div');
row.className = 'player-selector-row';
if (tempSelectedPlayerIds.includes(player.id)) { row.classList.add('active'); }
var photoDiv = document.createElement('div');
photoDiv.className = 'player-photo-mini';
if (player.photo) { photoDiv.style.backgroundImage = "url('" + player.photo + "')"; }
row.appendChild(photoDiv);
var nameLabel = document.createElement('div');
nameLabel.className = 'player-row-name';
nameLabel.innerText = player.name;
row.appendChild(nameLabel);
row.addEventListener('click', function() {
if (tempSelectedPlayerIds.includes(player.id)) {
var index = tempSelectedPlayerIds.indexOf(player.id);
tempSelectedPlayerIds.splice(index, 1);
row.classList.remove('active');
} else {
tempSelectedPlayerIds.push(player.id);
row.classList.add('active');
}
});
listContainer.appendChild(row);
});
var playerOverlay = document.getElementById('player-modal-overlay');
if (playerOverlay) playerOverlay.classList.add('open');
setTimeout(function() {
 var playerMenu = document.getElementById('player-selector-menu');
 if (playerMenu) playerMenu.classList.add('open');
}, 10);
}

function closePlayerSelectorMenu() {
 var playerMenu = document.getElementById('player-selector-menu');
 if (playerMenu) playerMenu.classList.remove('open');
 setTimeout(function() {
 var playerOverlay = document.getElementById('player-modal-overlay');
 if (playerOverlay) playerOverlay.classList.remove('open');
 }, 300);
}

document.getElementById('player-selector-ok-btn').addEventListener('click', function() {
activePlayerIds = [...tempSelectedPlayerIds];
closePlayerSelectorMenu();
renderMainGrid();
});

function handleDeckClick(event) {
event.stopPropagation();
var deckContainer = document.getElementById('version-deck-container');
var clickedElement = event.target.closest('.version-card');
if (!isDeckExpanded) {
deckContainer.classList.add('expanded');
isDeckExpanded = true;
} else if (clickedElement) {
var clickedVersion = clickedElement.getAttribute('data-version');
if (clickedVersion && clickedVersion !== selectedVersion) {
selectedVersion = clickedVersion;
isDarkSideActive = false;
document.body.setAttribute('data-theme', selectedVersion);
var assets = themeAssets[selectedVersion];
if (assets) {
var imgGame = document.getElementById('img-nav-game');
var imgRating = document.getElementById('img-nav-rating');
var imgSettings = document.getElementById('img-nav-settings');
if (imgGame) imgGame.src = assets.btnGame;
if (imgRating) imgRating.src = assets.btnRating;
if (imgSettings) imgSettings.src = assets.btnSettings;
}
}
var cards = deckContainer.getElementsByClassName('version-card');
for (var i = 0; i < cards.length; i++) {
var card = cards[i];
if (card.getAttribute('data-version') === selectedVersion) {
card.className = "version-card active-deck";
} else {
card.className = "version-card";
}
}
deckContainer.classList.remove('expanded');
isDeckExpanded = false;
if (curPlayerId !== null) {
renderCardsGrid();
updateLiveTotal();
updateFlipButtonVisibility();
}
} else {
deckContainer.classList.remove('expanded');
isDeckExpanded = false;
}
}

function renderCardsGrid() {
var html = "";
var currentKey = getActiveDeckKey();
var activeCards = cardsData[currentKey] || [];
for (var i = 0; i < activeCards.length; i++) {
var card = activeCards[i];
var count = currentRoundCounts[card.id] || 0;
var activeClass = count > 0 ? ' active' : '';
html += '<div class="uno-card-item" data-card-id="' + card.id + '">' +
'<div id="badge-' + card.id + '" class="uno-card-counter' + activeClass + '">' +
count + '</div>' +
'<img src="' + card.img + '" alt="Карта ' + card.points + ' очков">' +
'</div>';
}
document.getElementById('cards-grid-target').innerHTML = html;
var cardItems = document.querySelectorAll('.uno-card-item');
cardItems.forEach(function(item) {
item.addEventListener('click', function() { clickCard(this.getAttribute('data-card-id')); });
});
}

function clickCard(cardId) {
if (!currentRoundCounts[cardId]) { currentRoundCounts[cardId] = 0; }
currentRoundCounts[cardId]++;
var badge = document.getElementById('badge-' + cardId);
if(badge) { badge.innerText = currentRoundCounts[cardId]; badge.classList.add('active'); }
updateLiveTotal();
}

function updateLiveTotal() {
var currentTotal = 0;
var currentKey = getActiveDeckKey();
var activeCards = cardsData[currentKey] || [];
for (var i = 0; i < activeCards.length; i++) {
var card = activeCards[i];
var count = currentRoundCounts[card.id] || 0;
currentTotal += count * card.points;
}
document.getElementById('modal-live-score').innerText = "+" + currentTotal;
}

function updateFlipButtonVisibility() {
var flipBtn = document.getElementById('flip-side-btn');
if (selectedVersion === "UNO Flip") {
flipBtn.style.display = "block";
} else {
flipBtn.style.display = "none";
isDarkSideActive = false;
}
}

function openCardCalc(id) {
curPlayerId = id;
var player = null;
for (var i = 0; i < players.length; i++) {
if (players[i].id === id) { player = players[i]; break; }
}
if(player) { document.getElementById('modal-player-title').innerText = player.name; }
currentRoundCounts = {};
document.getElementById('modal-live-score').innerText = "+0";
updateFlipButtonVisibility();
renderCardsGrid();
openSheet();
}

function showWinnerOverlay(winnerPlayer) {
  var bannerImgSrc = "winner.png";
  if (selectedVersion === "UNO Flip") bannerImgSrc = "winner_f.png";
  if (selectedVersion === "UNO Dos") bannerImgSrc = "winner_d.png";

  var overlay = document.createElement('div');
  overlay.className = 'winner-fullscreen-overlay';

  var winnerPhotoSrc = winnerPlayer.photo ? winnerPlayer.photo : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

  overlay.innerHTML = `
    <img src="${bannerImgSrc}" class="winner-banner-img" alt="Winner!">
    <img src="${winnerPhotoSrc}" class="winner-photo" alt="">
    <div class="winner-name-text">${winnerPlayer.name}</div>
  `;

  overlay.addEventListener('click', function() {
    overlay.remove();
    switchPage('page-game');
  });

  document.body.appendChild(overlay);
}

function confirmRoundScore() {
var roundTotal = 0;
var currentKey = getActiveDeckKey();
var activeCards = cardsData[currentKey] || [];
for (var i = 0; i < activeCards.length; i++) {
var card = activeCards[i];
var count = currentRoundCounts[card.id] || 0;
roundTotal += count * card.points;
}
if (curPlayerId !== null) {
for (var j = 0; j < players.length; j++) {
if (players[j].id === curPlayerId) { players[j].score += roundTotal; break; }
}
var targetLimit = (selectedVersion === "UNO Dos") ? 200 : 500;
var partyOver = false;

for (var k = 0; k < players.length; k++) {
if (activePlayerIds.includes(players[k].id) && players[k].score >= targetLimit) {
partyOver = true;
break;
}
}
if (partyOver) {
var winnerPlayer = null;
var maxScore = -1; 

players.forEach(function(p) {
  if (activePlayerIds.includes(p.id)) {
    if (p.score > maxScore) { maxScore = p.score; }
  }
});

for (var x = 0; x < players.length; x++) {
  if (activePlayerIds.includes(players[x].id) && players[x].score === maxScore) {
    winnerPlayer = players[x];
    break; 
  }
}

var frozenWinner = {
  name: winnerPlayer ? winnerPlayer.name : "ПОБЕДИТЕЛЬ",
  photo: winnerPlayer ? winnerPlayer.photo : ""
};

for (var m = 0; m < players.length; m++) {
players[m].globalScore += players[m].score;
players[m].score = 0;
}

showWinnerOverlay(frozenWinner);
}
curPlayerId = null;
}
savePlayersToDB();
closeSheet();
}

function toggleFlipSide() {
if (selectedVersion === "UNO Flip") {
isDarkSideActive = !isDarkSideActive;
renderCardsGrid();
updateLiveTotal();
}
}

function updateLeaderboard() {
var sorted = [];
players.forEach(function(p) { sorted.push(p); });
sorted.sort(function(a, b) { return b.globalScore - a.globalScore; });
var html = "";
for (var i = 0; i < sorted.length; i++) {
var player = sorted[i];
var frameImgClass;
if (i === 0) frameImgClass = "rank-1";
else if (i === 1) frameImgClass = "rank-2";
else if (i === 2) frameImgClass = "rank-3";
else frameImgClass = "rank-other";
var imgSrc = player.photo ? player.photo : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
html += '<div class="rating-player-row">' +
'<img class="rating-row-photo" src="' + imgSrc + '" alt="">' +
'<div class="rating-row-frame ' + frameImgClass + '"></div>' +
'<div class="rating-player-name">' + player.name + '</div>' +
'<div class="rating-player-rank">' + (i + 1) + '</div>' +
'<div class="rating-player-score">' + player.globalScore + '</div>' +
'</div>';
}

html += '<button class="btn-reset-leaderboard" id="btn-reset-scores">Сбросить статистику</button>';

document.getElementById('rating-list-target').innerHTML = html;

document.getElementById('btn-reset-scores').addEventListener('click', function() {
  if (confirm("Вы уверены, что хотите полностью сбросить глобальный рейтинг всех игроков? Это действие необратимо.")) {
    players.forEach(function(p) { p.globalScore = 0; p.score = 0; });
    savePlayersToDB();
  }
});
}

function renderSettingsPlayers() {
  var container = document.getElementById('settings-players-list');
  container.innerHTML = '';
  players.forEach(function(player) {
    var item = document.createElement('div');
    item.className = 'settings-player-item';
    var previewSrc = player.photo ? player.photo : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    item.innerHTML = `
      <div style="display:flex; align-items:center; gap:12px;">
        <img class="settings-photo-preview" src="${previewSrc}" data-id="${player.id}" title="Изменить фото">
        <input type="text" class="settings-player-name-input" data-id="${player.id}" value="${player.name}">
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn-upload-photo" data-id="${player.id}">Фото</button>
        <button class="btn-delete-player" data-id="${player.id}">Удалить</button>
      </div>
    `;
    container.appendChild(item);
  });
  
  var nameInputs = container.querySelectorAll('.settings-player-name-input');
  nameInputs.forEach(function(input) {
    input.addEventListener('input', function() {
      var pId = parseInt(this.getAttribute('data-id'));
      var newName = this.value.trim().toUpperCase();
      if (newName.length > 0) {
        for (var i = 0; i < players.length; i++) {
          if (players[i].id === pId) { players[i].name = newName; break; }
        }
        savePlayersToDB();
      }
    });
  });

  var uploadButtons = container.querySelectorAll('.btn-upload-photo');
  var previews = container.querySelectorAll('.settings-photo-preview');
  
  function triggerPhotoSelect() {
    photoTargetPlayerId = parseInt(this.getAttribute('data-id'));
    document.getElementById('hidden-photo-input').click();
  }
  
  uploadButtons.forEach(function(btn) { btn.addEventListener('click', triggerPhotoSelect); });
  previews.forEach(function(img) { img.addEventListener('click', triggerPhotoSelect); });

  var deleteButtons = container.querySelectorAll('.btn-delete-player');
  deleteButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pId = parseInt(this.getAttribute('data-id'));
      var pName = "";
      for(var i=0; i<players.length; i++) {
        if(players[i].id === pId) { pName = players[i].name; break; }
      }
      if (confirm("Вы уверены, что хотите полностью удалить игрока " + pName + "?")) {
        players = players.filter(function(p) { return p.id !== pId; });
        activePlayerIds = activePlayerIds.filter(function(id) { return id !== pId; });
        savePlayersToDB();
      }
    });
  });
}

document.getElementById('btn-create-player').addEventListener('click', function() {
  var defaultNewName = "ИГРОК " + (players.length + 1);
  var promptName = prompt("Введите имя нового участника:", defaultNewName);
  if (promptName === null) return;
  var finalName = promptName.trim().toUpperCase();
  if (finalName.length === 0) finalName = defaultNewName;
  
  var maxId = 0;
  players.forEach(function(p) { if(p.id > maxId) maxId = p.id; });
  var newId = maxId + 1;
  
  players.push({ id: newId, name: finalName, score: 0, globalScore: 0, photo: "" });
  savePlayersToDB();
});

document.getElementById('hidden-photo-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(event) {
    var base64Img = event.target.result;
    for (var i = 0; i < players.length; i++) {
      if (players[i].id === photoTargetPlayerId) {
        players[i].photo = base64Img;
        break;
      }
    }
    savePlayersToDB();
  };
  reader.readAsDataURL(file);
});

// ОБНОВЛЕННАЯ ФУНКЦИЯ ПЕРЕКЛЮЧЕНИЯ СТРАНИЦ
function switchPage(pageId) {
const newIndex = pagesList.indexOf(pageId);
if (newIndex === -1) return;
currentPageIndex = newIndex;

// Логическое переключение классов active для триггеров обновления контента
pagesList.forEach(id => document.getElementById(id).classList.remove('active'));
document.getElementById(pageId).classList.add('active');

// Анимация слайда
document.getElementById('pages-wrapper').style.transform = `translateX(-${currentPageIndex * 33.3333}%)`;

var deckContainer = document.getElementById('version-deck-container');
if (deckContainer) {
if(pageId === 'page-game') {
deckContainer.style.visibility = 'visible';
deckContainer.style.opacity = '1';
deckContainer.style.pointerEvents = 'auto';
} else {
deckContainer.style.visibility = 'hidden';
deckContainer.style.opacity = '0';
deckContainer.style.pointerEvents = 'none';
}
deckContainer.classList.remove('expanded');
isDeckExpanded = false;
}
if(pageId === 'page-rating') { updateLeaderboard(); }
if(pageId === 'page-settings') { renderSettingsPlayers(); }
closeSheet();
closePlayerSelectorMenu();
}

// ЛОГИКА ОБРАБОТКИ СВАЙПОВ (TOUCH EVENTS)
const pagesWrapper = document.getElementById('pages-wrapper');

pagesWrapper.addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, {passive: true});

pagesWrapper.addEventListener('touchend', function(e) {
  touchEndX = e.changedTouches[0].screenX;
  touchEndY = e.changedTouches[0].screenY;
  handleSwipe();
}, {passive: true});

function handleSwipe() {
  // Блокируем свайп, если открыты модальные окна поверх интерфейса
  if (document.getElementById('modal-overlay').classList.contains('open') ||
      document.getElementById('player-modal-overlay').classList.contains('open')) {
      return;
  }

  const diffX = touchStartX - touchEndX;
  const diffY = touchStartY - touchEndY;

  // Проверка: горизонтальный свайп должен быть больше вертикального (защита от ложных срабатываний при скролле)
  // и превышать установленный порог (SWIPE_THRESHOLD)
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD) {
      if (diffX > 0) {
          // Свайп влево -> следующая страница
          if (currentPageIndex < pagesList.length - 1) {
              switchPage(pagesList[currentPageIndex + 1]);
          }
      } else {
          // Свайп вправо -> предыдущая страница
          if (currentPageIndex > 0) {
              switchPage(pagesList[currentPageIndex - 1]);
          }
      }
  }
}

function openSheet() {
var overlay = document.getElementById('modal-overlay');
if (overlay) overlay.classList.add('open');
setTimeout(function() {
var sheet = document.getElementById('sheet-cards');
if (sheet) sheet.classList.add('open');
}, 10);
}

function closeSheet() {
var sheet = document.getElementById('sheet-cards');
if (sheet) sheet.className = 'bottom-sheet sheet-cards-bg';
setTimeout(function() {
var overlay = document.getElementById('modal-overlay');
if (overlay) overlay.classList.remove('open');
}, 300);
}

var deckContainer = document.getElementById('version-deck-container');
deckContainer.addEventListener('click', handleDeckClick);
document.getElementById('modal-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-cards').addEventListener('click', function(event) { event.stopPropagation(); });
document.getElementById('player-modal-overlay').addEventListener('click', closePlayerSelectorMenu);
document.getElementById('player-selector-menu').addEventListener('click', function(event) { event.stopPropagation(); });
document.getElementById('flip-side-btn').addEventListener('click', toggleFlipSide);
document.getElementById('btn-confirm').addEventListener('click', confirmRoundScore);

document.getElementById('btn-game').addEventListener('click', function() { switchPage('page-game'); });
document.getElementById('btn-rating').addEventListener('click', function() { switchPage('page-rating'); });
document.getElementById('btn-settings').addEventListener('click', function() { switchPage('page-settings'); });

document.addEventListener('click', function(event) {
if (isDeckExpanded && deckContainer && !deckContainer.contains(event.target)) {
deckContainer.classList.remove('expanded');
isDeckExpanded = false;
}
});
